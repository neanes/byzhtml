---
name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Enable Corepack
        run: corepack enable npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23.2.0

      - name: Build
        run: npm run build
